{% extends "base.html" %}

{% block title %}顾客管理 - 餐厅管理系统{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>👥 顾客管理</h2>
        <button class="btn btn-primary" onclick="openAddModal()">
            <i class="fas fa-plus"></i> 添加新顾客
        </button>
    </div>

    <!-- 搜索框 -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="text" class="form-control" id="searchPhone" placeholder="手机号">
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control" id="searchName" placeholder="姓名">
                </div>
                <div class="col-md-2">
                    <select class="form-select" id="searchGender">
                        <option value="">所有性别</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select" id="searchLevel">
                        <option value="">所有等级</option>
                        <option value="普通">普通</option>
                        <option value="VIP">VIP</option>
                        <option value="SVIP">SVIP</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button class="btn btn-primary w-100" onclick="searchCustomers()">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                </div>
                <div class="col-md-1">
                    <button class="btn btn-secondary w-100" onclick="resetSearch()">
                        <i class="fas fa-redo"></i> 重置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 顾客表格 -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>手机号</th>
                            <th>姓名</th>
                            <th>性别</th>
                            <th>生日</th>
                            <th>等级</th>
                            <th>积分</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="customersTableBody">
                        <!-- 顾客数据将通过JavaScript动态加载 -->
                        <tr>
                            <td colspan="8" class="text-center py-4">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                                <p class="mt-2">正在加载顾客数据...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 添加/编辑顾客模态框 -->
<div class="modal fade" id="customerModal" tabindex="-1" aria-labelledby="customerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="customerModalLabel">添加顾客</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="customerForm">
                    <input type="hidden" id="editCustomerId">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">姓名 *</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label">手机号 *</label>
                            <input type="text" class="form-control" id="phone" required maxlength="11">
                        </div>
                        <div class="col-md-6">
                            <label for="gender" class="form-label">性别</label>
                            <select class="form-select" id="gender">
                                <option value="">请选择性别</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                            <small class="text-muted">不选则显示为 -</small>
                        </div>
                        <div class="col-md-6">
                            <label for="birth_date" class="form-label">生日</label>
                            <input type="date" class="form-control" id="birth_date">
                            <small class="text-muted">选填</small>
                        </div>
                        <div class="col-md-12">
                            <label for="points" class="form-label">积分</label>
                            <input type="number" class="form-control" id="points" value="0" min="0">
                            <small class="text-muted">积分决定会员等级：0-999=普通，1000-1999=白银，2000-4999=黄金，5000-9999=白金，10000+=钻石</small>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">会员等级</label>
                            <div class="form-control-plaintext">
                                <span id="memberLevelDisplay" class="badge bg-secondary">普通会员</span>
                                <small class="text-muted">（根据积分自动计算）</small>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveCustomer()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 页面加载时获取顾客数据
document.addEventListener('DOMContentLoaded', function() {
    loadCustomers();

    // 积分输入时更新等级显示
    document.getElementById('points').addEventListener('input', updateMemberLevelDisplay);
});

// 加载顾客数据
async function loadCustomers() {
    try {
        console.log('开始加载顾客数据...');
        const response = await fetch('/api/customers');

        if (!response.ok) {
            throw new Error(`HTTP错误! 状态码: ${response.status}`);
        }

        const result = await response.json();
        console.log('API返回数据:', result);

        if (result.success) {
            renderCustomerTable(result.data || []);
        } else {
            showAlert('获取顾客数据失败: ' + (result.message || '未知错误'), 'danger');
        }

    } catch (error) {
        console.error('加载顾客数据失败:', error);
        showAlert('加载顾客数据失败，请检查网络连接', 'danger');

        // 显示错误状态
        const tbody = document.getElementById('customersTableBody');
        tbody.innerHTML = `
            <tr>
                <td colspan="8" class="text-center py-4 text-danger">
                    <i class="fas fa-exclamation-triangle fa-2x mb-2"></i>
                    <p>数据加载失败</p>
                    <small>${error.message}</small>
                </td>
            </tr>
        `;
    }
}

// 渲染顾客表格
function renderCustomerTable(customers) {
    const tbody = document.getElementById('customersTableBody');

    if (!customers || customers.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="8" class="text-center py-4">
                    <i class="fas fa-user-slash fa-2x text-muted mb-2"></i>
                    <p>暂无顾客数据</p>
                    <button class="btn btn-sm btn-primary mt-2" onclick="openAddModal()">
                        添加第一个顾客
                    </button>
                </td>
            </tr>
        `;
        return;
    }

    let html = '';

    customers.forEach(customer => {
        // 使用数据库实际字段名 - 添加更多可能的字段名
        const name = customer.name || customer.customer_name || customer.顾客姓名 || customer.姓名 || '-';
        const phone = customer.phone || customer.phone_number || customer.顾客电话 || customer.手机号 || '-';
        const gender = customer.gender || customer.sex || customer.性别 || '-';
        const points = customer.points || customer.integral || customer.积分 || 0;

        // 格式化生日日期 - 只显示年月日
        let birthDate = '-';
        try {
            const birthDateRaw = customer.birth_date || customer.birthday || customer.生日;
            if (birthDateRaw) {
                // 处理不同格式的日期
                if (typeof birthDateRaw === 'string') {
                    // 如果是完整日期时间格式：YYYY-MM-DD HH:MM:SS 或 YYYY-MM-DDTHH:MM:SS
                    if (birthDateRaw.includes(' ')) {
                        birthDate = birthDateRaw.split(' ')[0]; // 取空格前的部分
                    } else if (birthDateRaw.includes('T')) {
                        birthDate = birthDateRaw.split('T')[0]; // 取T前的部分
                    } else {
                        birthDate = birthDateRaw; // 直接使用
                    }
                } else if (birthDateRaw instanceof Date) {
                    // 如果是Date对象
                    birthDate = birthDateRaw.toISOString().split('T')[0]; // 格式化为YYYY-MM-DD
                }
            }
        } catch (e) {
            console.warn('格式化生日日期失败:', e);
            birthDate = '-';
        }

        // 计算会员等级
        let levelClass, levelText;
        if (points >= 10000) {
            levelClass = 'badge bg-danger';
            levelText = '钻石会员';
        } else if (points >= 5000) {
            levelClass = 'badge bg-warning';
            levelText = '白金会员';
        } else if (points >= 2000) {
            levelClass = 'badge bg-warning';
            levelText = '黄金会员';
        } else if (points >= 1000) {
            levelClass = 'badge bg-info';
            levelText = '白银会员';
        } else {
            levelClass = 'badge bg-secondary';
            levelText = '普通会员';
        }

        // 格式化注册时间 - 只显示年月日
        let registerTime = '-';
        try {
            // 尝试不同的字段名
            const registerTimeRaw = customer.register_time || customer.注册时间 || customer.created_at || customer.create_time || customer.创建时间;

            if (registerTimeRaw) {
                // 处理不同格式的日期
                if (typeof registerTimeRaw === 'string') {
                    // 如果是完整日期时间格式：YYYY-MM-DD HH:MM:SS 或 YYYY-MM-DDTHH:MM:SS
                    if (registerTimeRaw.includes(' ')) {
                        registerTime = registerTimeRaw.split(' ')[0]; // 取空格前的部分
                    } else if (registerTimeRaw.includes('T')) {
                        registerTime = registerTimeRaw.split('T')[0]; // 取T前的部分
                    } else {
                        registerTime = registerTimeRaw; // 直接使用
                    }
                } else if (registerTimeRaw instanceof Date) {
                    // 如果是Date对象
                    registerTime = registerTimeRaw.toISOString().split('T')[0]; // 格式化为YYYY-MM-DD
                }
            }
        } catch (e) {
            console.warn('格式化注册时间失败:', e);
            registerTime = '-';
        }

        html += `
            <tr>
                <td>${phone}</td>
                <td>${name}</td>
                <td>${gender}</td>
                <td>${birthDate}</td>
                <td><span class="${levelClass}">${levelText}</span></td>
                <td><span class="badge bg-primary">${points}</span></td>
                <td>${registerTime}</td>
                <td>
                    <button class="btn btn-sm btn-primary me-1" onclick="openEditModal('${phone}')">
                        <i class="fas fa-edit"></i> 编辑
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="deleteCustomer('${phone}')">
                        <i class="fas fa-trash"></i> 删除
                    </button>
                </td>
            </tr>
        `;
    });

    tbody.innerHTML = html;
}

// 根据积分更新会员等级显示
function updateMemberLevelDisplay() {
    const points = parseInt(document.getElementById('points').value) || 0;
    const displayElement = document.getElementById('memberLevelDisplay');

    if (points >= 10000) {
        displayElement.className = 'badge bg-danger';
        displayElement.textContent = '钻石会员';
    } else if (points >= 5000) {
        displayElement.className = 'badge bg-warning';
        displayElement.textContent = '白金会员';
    } else if (points >= 2000) {
        displayElement.className = 'badge bg-warning';
        displayElement.textContent = '黄金会员';
    } else if (points >= 1000) {
        displayElement.className = 'badge bg-info';
        displayElement.textContent = '白银会员';
    } else {
        displayElement.className = 'badge bg-secondary';
        displayElement.textContent = '普通会员';
    }
}

// 搜索顾客
async function searchCustomers() {
    try {
        const phone = document.getElementById('searchPhone').value;
        const name = document.getElementById('searchName').value;
        const gender = document.getElementById('searchGender').value;
        const level = document.getElementById('searchLevel').value;

        // 构建查询参数
        const params = new URLSearchParams();
        if (phone) params.append('phone', phone);
        if (name) params.append('name', name);
        if (gender) params.append('gender', gender);
        if (level) params.append('level', level);

        console.log('搜索参数:', params.toString());

        const response = await fetch(`/api/customers?${params}`);

        if (!response.ok) {
            throw new Error(`搜索请求失败! 状态码: ${response.status}`);
        }

        const result = await response.json();
        console.log('搜索结果:', result);

        if (result.success) {
            renderCustomerTable(result.data);
        } else {
            showAlert('搜索失败: ' + (result.message || '未知错误'), 'danger');
        }

    } catch (error) {
        console.error('搜索顾客失败:', error);
        showAlert('搜索失败: ' + error.message, 'danger');
    }
}

// 打开添加模态框
function openAddModal() {
    console.log('打开添加模态框');
    document.getElementById('customerModalLabel').textContent = '添加顾客';
    document.getElementById('customerForm').reset();
    document.getElementById('editCustomerId').value = '';
    document.getElementById('gender').value = '';
    document.getElementById('birth_date').value = '';
    document.getElementById('points').value = 0;

    // 更新等级显示
    updateMemberLevelDisplay();

    // 显示模态框
    const modal = new bootstrap.Modal(document.getElementById('customerModal'));
    modal.show();
}

// 打开编辑模态框
async function openEditModal(phone) {
    console.log('打开编辑模态框，手机号:', phone);

    try {
        const response = await fetch('/api/customers');

        if (!response.ok) {
            throw new Error(`获取数据失败! 状态码: ${response.status}`);
        }

        const result = await response.json();

        if (result.success) {
            const customers = result.data || [];

            // 从列表中查找指定手机号的顾客
            const customer = customers.find(c => {
                // 尝试匹配多个可能的字段名
                const customerPhone = c.phone || c.phone_number || c.顾客电话 || c.手机号;
                return customerPhone === phone;
            });

            if (!customer) {
                showAlert('未找到该顾客信息', 'danger');
                return;
            }

            // 填充表单数据
            document.getElementById('customerModalLabel').textContent = '编辑顾客';
            document.getElementById('editCustomerId').value = phone;

            // 使用正确的字段名
            const name = customer.name || customer.customer_name || customer.顾客姓名 || customer.姓名 || '';
            const gender = customer.gender || customer.sex || customer.性别 || '';
            const points = customer.points || customer.integral || customer.积分 || 0;

            // 处理生日日期 - 只显示年月日
            let birthDate = '';
            try {
                const birthDateRaw = customer.birth_date || customer.birthday || customer.生日;
                if (birthDateRaw) {
                    if (typeof birthDateRaw === 'string') {
                        // 提取年月日部分
                        if (birthDateRaw.includes(' ')) {
                            birthDate = birthDateRaw.split(' ')[0];
                        } else if (birthDateRaw.includes('T')) {
                            birthDate = birthDateRaw.split('T')[0];
                        } else {
                            birthDate = birthDateRaw;
                        }
                    } else if (birthDateRaw instanceof Date) {
                        birthDate = birthDateRaw.toISOString().split('T')[0];
                    }
                }
            } catch (e) {
                console.warn('处理生日日期失败:', e);
            }

            document.getElementById('name').value = name;
            document.getElementById('phone').value = phone; // 手机号作为标识，不可编辑
            document.getElementById('phone').readOnly = true; // 编辑时禁止修改手机号
            document.getElementById('gender').value = gender;
            document.getElementById('birth_date').value = birthDate;
            document.getElementById('points').value = points;

            // 更新等级显示
            updateMemberLevelDisplay();

            // 显示模态框
            const modal = new bootstrap.Modal(document.getElementById('customerModal'));
            modal.show();
        } else {
            showAlert('获取顾客信息失败: ' + (result.message || '未知错误'), 'danger');
        }

    } catch (error) {
        console.error('获取顾客信息失败:', error);
        showAlert('获取顾客信息失败: ' + error.message, 'danger');
    }
}

// 删除顾客
async function deleteCustomer(phone) {
    if (!confirm('确定要删除这个顾客吗？\n\n注意：如果顾客有历史订单，删除后订单记录将无法关联到顾客。\n此操作不可撤销！')) {
        return;
    }

    try {
        console.log('正在删除顾客，手机号:', phone);

        const response = await fetch(`/api/customers/${phone}`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json'
            }
        });

        const result = await response.json();
        console.log('删除API响应:', result);

        if (result.success) {
            showAlert(result.message || '顾客删除成功', 'success');
            loadCustomers(); // 重新加载数据
        } else {
            showAlert('删除失败: ' + (result.message || '未知错误'), 'danger');
        }

    } catch (error) {
        console.error('删除顾客失败:', error);
        showAlert('删除失败: ' + error.message, 'danger');
    }
}

// 保存顾客
async function saveCustomer() {
    console.log('保存顾客...');

    const customerId = document.getElementById('editCustomerId').value;
    const isEdit = !!customerId;

    const customerData = {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        gender: document.getElementById('gender').value,
        birth_date: document.getElementById('birth_date').value || null,
        points: parseInt(document.getElementById('points').value) || 0
    };

    // 验证必填字段
    if (!customerData.name) {
        showAlert('姓名不能为空', 'danger');
        return;
    }

    if (!customerData.phone) {
        showAlert('手机号不能为空', 'danger');
        return;
    }

    try {
        let response;
        let url;

        if (isEdit) {
            // 更新顾客 - 使用 phone 作为标识
            url = `/api/customers/${customerId}`;
            response = await fetch(url, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(customerData)
            });
        } else {
            // 添加顾客
            url = '/api/customers';
            response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(customerData)
            });
        }

        const result = await response.json();
        console.log('保存响应:', result);

        if (result.success) {
            showAlert(result.message, 'success');

            // 关闭模态框
            const modal = bootstrap.Modal.getInstance(document.getElementById('customerModal'));
            if (modal) modal.hide();

            // 重新加载数据
            loadCustomers();
        } else {
            showAlert('操作失败: ' + (result.message || '未知错误'), 'danger');
        }

    } catch (error) {
        console.error('保存顾客失败:', error);
        showAlert('保存失败: ' + error.message, 'danger');
    }
}

// 显示消息提示
function showAlert(message, type) {
    console.log(`显示提示: ${type} - ${message}`);

    // 移除现有提示
    const existingAlerts = document.querySelectorAll('.alert');
    existingAlerts.forEach(alert => alert.remove());

    // 创建新的提示
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
    alertDiv.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;

    // 添加到页面顶部
    const container = document.querySelector('.container-fluid');
    if (container) {
        container.insertBefore(alertDiv, container.firstChild);

        // 5秒后自动消失
        setTimeout(() => {
            if (alertDiv.parentNode) {
                const bsAlert = new bootstrap.Alert(alertDiv);
                bsAlert.close();
            }
        }, 5000);
    } else {
        alert(message);
    }
}

// 重置搜索
function resetSearch() {
    console.log('重置搜索');
    document.getElementById('searchPhone').value = '';
    document.getElementById('searchName').value = '';
    document.getElementById('searchGender').value = '';
    document.getElementById('searchLevel').value = '';
    loadCustomers();
}

// 日期格式化辅助函数
function formatDate(dateString) {
    if (!dateString) return '-';

    try {
        // 处理不同格式的日期字符串
        if (dateString.includes(' ')) {
            return dateString.split(' ')[0]; // YYYY-MM-DD
        } else if (dateString.includes('T')) {
            return dateString.split('T')[0]; // YYYY-MM-DD
        } else if (dateString.length >= 10) {
            return dateString.substring(0, 10); // YYYY-MM-DD
        } else {
            return dateString;
        }
    } catch (e) {
        console.warn('日期格式化失败:', dateString, e);
        return '-';
    }
}
</script>
{% endblock %}
